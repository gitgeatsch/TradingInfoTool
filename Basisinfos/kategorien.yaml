# Kategorie-Taxonomie fuer Aktien/ETF/Rohstoffe (2026-07-19, Nutzer-Wunsch nach
# strukturierten Hauptgruppen/Unterkategorien fuer Diversifikation + Marktscan-
# Schwerpunkte). Systematisch aus Bitpandas vollstaendigem ETF/ETC/Edelmetall-
# Katalog (211 reale Produkte, live abgerufen ueber api.bitpanda.py, NACH dem
# Dedup-Bugfix in _fetch_all_bitpanda_assets() - siehe dort) hergeleitet - jedes
# reale Bitpanda-Symbol ist genau einer Unterkategorie zugeordnet (siehe
# Vollstaendigkeits-Check im Bau-Skript). Krypto bewusst NICHT Teil dieser Datei.
#
# 'bitpanda_symbole' sind NUR fuer die automatische Vor-Klassifikation neuer
# Screener-/Marktscan-Kandidaten gedacht (Symbol -> Hauptgruppe/Unterkategorie).
# Fuer eigene Watchlist-Assets (auch externe, nicht bei Bitpanda gelistete) wird
# die Hauptgruppe/Unterkategorie direkt am Asset in der Watchlist gespeichert,
# unabhaengig davon, ob es in dieser Liste vorkommt.
#
# BEARBEITEN IN NOTEPAD++ - reine Text-/YAML-Datei, keine Datenbank.

