# --- Strategie-Katalog (siehe Spezifikation Kap. 6) ---
strategien:
  - id: S-1
    name: HODL / Core
    beschreibung: Langfristig halten, nur an starken Leveln nachkaufen (DCA)
    aktiv: true
  - id: S-2
    name: DCA
    beschreibung: Regelmaessige Kaeufe unabhaengig vom Preis
    aktiv: true
  - id: S-3
    name: Swing-Trading
    beschreibung: Ein-/Ausstieg an Support/Resistance und Fibonacci, Haltedauer Tage bis Wochen
    aktiv: true
  - id: S-4
    name: Trendfolge
    beschreibung: Einstieg bei bestaetigtem Trend (EMA-Crossover/MACD), Trailing-Stop
    aktiv: true
  - id: S-5
    name: Kapitalschutz
    beschreibung: Defensiv, hohe Cash-Quote; automatisch aktiv bei Drawdown-Limit
    aktiv: true
  - id: S-6
    name: Hebel (Long und Short)
    beschreibung: Nur fuer geeignete Assets, strikt nach Risiko-Regeln (siehe Kap. 14
      Regelwerksmanual/docs/hebel_positionsformel.md). Short beratend, Bitpanda fuehrt
      aktuell nur Long aus.
    aktiv: true                        # 2026-07-14: dieser Eintrag war bisher NICHT mit
    # dem echten Code verdrahtet (kein hebel_screening.py/budget_allocator.py-Codepfad
    # prueft ihn) - die tatsaechlichen Schalter sind hebel_screening.aktiv und
    # budget_allocator.aktiv (beide default true). Auf true korrigiert, damit dieser
    # Eintrag die reale Aktivitaet widerspiegelt statt sie faelschlich zu verneinen.

# --- Technische Indikatoren (siehe Spezifikation Kap. 7) ---
indikatoren:
  trend: [EMA, MACD]
  ema_perioden: [20, 50, 200]
  momentum: [RSI]
  rsi_periode: 14
  volatilitaet: [BollingerBands, ATR]
  levels: [Fibonacci, SupportResistance]
  marktbreite: [BTC_Dominanz, FearGreedIndex]
  confluence_pflicht: true             # kein Signal aus einem einzelnen Indikator

# --- Agent-Entscheidung: Zeithorizonte und Gewichtung (siehe Kap. 5) ---
agent:
  timeframes:
    trend: 1W                          # [OFFEN] Vorschlag
    basis: 1D
    feintiming: 4H
  # Gewichtung der Faktoren in der Signal-Entscheidung (Summe ~ 1.0)
  gewichtung:
    technische_analyse: 0.5
    makro: 0.3
    sentiment: 0.2                     # niedrig - Manipulationsgefahr
  forecast_szenarien: [bull, base, bear]
  # KI-Ebene (P-8, Architektur-Seam 2026-07-10, siehe api/local_model.py):
  # "groq" (aktiv) oder "lokal" (vorbereitet, noch NICHT implementiert - erst nach
  # Hardware-Upgrade des Notebooks, siehe api/local_model.py fuer die Begruendung).
  ai_provider: groq

# --- Datenquellen (siehe Spezifikation Kap. 8) ---
datenquellen:
  marktdaten:
    anbieter: CoinGecko
    api_key_noetig: false
    rate_limit_pro_minute: 30
  makro:
    leitzinsen: [Fed, EZB, BoJ, PBoC, BoK]
    maerkte: [USA, Japan, China, EU, Korea]
    krypto_makro: [BTC_Dominanz, FearGreedIndex]  # ERLEDIGT 2026-07-07: api/macro.py
                                        # (CoinGecko /global + alternative.me, beide kostenlos)
    # ERLEDIGT 2026-07-08: recherchiert, implementiert UND live mit echtem Key
    # verifiziert (Spezifikation Kap. 8):
    #   Fed/EZB/M2/CPI/ISM-Ersatz(Philly-Fed)/BoJ/BoK -> alles ueber FRED (ein Key,
    #   kostenlos, 120 Req/Min): FEDFUNDS, ECBDFR/ECBMRRFR/ECBMLFR, M2SL,
    #   CPIAUCSL/CPILFESL, GACDFSA066MSFRBPHI, IRSTCI01JPM156N, INTDSRKRM193N
    #   (BoJ/BoK ~2 Mon. Verzug, eigene Staleness-Schwelle noch zu definieren)
    #   PBoC -> datacenter-web.eastmoney.com (via akshare-Recherche gefunden),
    #   leichtgewichtiger requests-Call statt akshare-Dependency; inoffiziell/
    #   reverse-engineered, siehe Spezifikation Kap. 8 fuer Details+Risiko
    #   Trueflation -> verworfen, kein kostenloser API-Zugang (nur Dashboard)
    api: "fred+eastmoney"              # FRED = St. Louis Fed, Eastmoney fuer PBoC-LPR
  sentiment:
    x_twitter:
      aktiv: false                     # [OFFEN] API-Kosten/ToS pruefen, spaetere Phase
      whitelist: []                    # seriose Accounts hier eintragen
    youtube:
      aktiv: false                     # [OFFEN] YouTube Data API + Transkripte pruefen
      kanaele: []

# --- Marktscan: Entdeckung neuer Assets (siehe Spezifikation Kap. 13) ---
marktscan:
  aktiv: true
  quelle: trending_gainers_vorfilter   # CoinGecko Trending/Top-Gainers als Vorfilter, dann Fundamentalcheck
  zeiten: ["04:00", "16:00"]           # 2x taeglich (Watchlist-Scan); weitere Funktionen [OFFEN]
  auto_watchlist: true                 # Kandidat automatisch als status: watchlist aufnehmen (MS-1)
  benachrichtigung_email: true         # zusaetzlich E-Mail mit P-5-Begruendung (MS-1)
  # Tier-Modell (Stufe A), Marktkap.-Grenzen in USD, VORLAEUFIG
  tiers:
    tier1_min_marktkap_usd: 1000000000 # >= 1 Mrd = etabliert
    tier2_min_marktkap_usd: 150000000  # 150 Mio - 1 Mrd = mittelgross
    tier3_min_marktkap_usd: 20000000   # 20 - 150 Mio = Small Cap (weiche Untergrenze, Override moeglich)
  filter:
    min_volumen_24h_usd: 5000000       # [OFFEN] A(MS)-3 Mindestliquiditaet
    min_alter_tage: 90                 # [OFFEN] A(MS)-3 Mindestalter (Naeherung ueber atl_date, siehe agent/marktscan.py)
    vol_marktkap_ratio_min: 0.005      # A(MS)-3 unteres Limit (Illiquiditaet)
    vol_marktkap_ratio_max: 1.0        # A(MS)-3 oberes Limit (Wash-Trading-Verdacht)
    stablecoins_ausschliessen: true    # A(MS)-3
  # Stufe B (vier Kategorien: Technik/Fundamental/Momentum/Kontext-Makro), C (Gewichtung
  # aus regime.profile, siehe unten) und D (Schwellen) - VORLAEUFIG, siehe agent/marktscan.py
  schwellen:
    score_kaufkandidat_ab: 70          # VORLAEUFIG - Stufe D
    score_watchlist_wuerdig_ab: 50     # VORLAEUFIG - Stufe D
  # `groq_automatisch_kaufkandidaten` (2026-07-09) entfernt (2026-07-14, Phase 5) -
  # der automatische Groq-Zweig ist in den zentralen budget_allocator (oben)
  # umgezogen, der manuelle UI-Klick bleibt weiterhin unveraendert verfuegbar.

# --- Batch-Signal-Berechnung (2026-07-13, siehe Regelwerksmanual.md Kap. 5/12) ---
# Signal-Berechnung kostet pro Asset einen echten Groq-Aufruf (~5.600-6.000 Tokens
# gemessen, siehe agent/krypto/signal_batch.py Modul-Docstring) - bei Groq Free-Tier
# (100.000 Tokens/Tag) sind real nur ~15-18 Berechnungen/Tag moeglich, NICHT die 1.000
# Requests/Tag, die das offizielle RPD-Limit allein suggerieren wuerde (TPD ist die
# bindende Grenze). Der urspruengliche taegliche 05:00-Scheduler-Job ist seit Phase 5
# (2026-07-14) entfernt - der Budget-Allocator (unten) uebernimmt die automatische
# Ueberfaellig-Rotation jetzt im 15-Min-Takt. `taegliches_budget` gilt nur noch fuer
# den manuellen "Fällige Signale jetzt berechnen"-Button (Signale-Tab), voellig
# eigenstaendig neben budget_allocator.taegliches_budget_gesamt.
signale_batch:
  taegliches_budget: 15                # konservativ unter dem gemessenen Maximum (~15-18)

# --- Budget-Allocator (2026-07-14, Phase 5, siehe docs/budget_queue_design.md) ---
# Zentrale Tagesbudget-Verteilung ueber Hebel (Tier 1) + Marktscan-Kaufkandidaten
# (Tier 2) + Spot-Rotation (Tier 3), huckepack auf dem 15-Min-Hebel-Screening-Takt.
budget_allocator:
  aktiv: true
  taegliches_budget_gesamt: 15          # B, Groqs realer Tages-Deckel (~15-18 gemessen)
  spot_rotation_reserve: 5              # F, garantiert Grundrotation (bestaetigt 2026-07-13)
  mistral_taegliches_budget: 150         # zweite Fallback-Stufe (2026-07-17, ersetzt Cerebras'
                                        # bisherige Rolle - Cerebras' Free-Tier endet 2026-08-17,
                                        # siehe Memory project_cerebras_free_tier_aenderung_2026-08-17) -
                                        # konservativer Deckel weit unter der echt im eigenen
                                        # Dashboard verifizierten Kapazitaet (mistral-small-2506:
                                        # 2.250.000 Tokens/Min, 5 Req/Sek ≈ 300/Min)
  cerebras_taegliches_budget: 60        # NUR NOCH BIS 2026-08-17 (danach Key aus .env entfernen,
                                        # siehe Memory project_cerebras_free_tier_aenderung_2026-08-17) -
                                        # eigener Deckel, konservativ unter der echten
                                        # ~166-Calls/Tag-Grenze (2026-07-14 per API-Headern
                                        # bestaetigt: 1.000.000 Tokens/Tag / ~6.000 Tokens/Call)
  gemini_taegliches_budget: 200          # letzte, seltenste Fallback-Stufe (2026-07-14, Position
                                        # 2026-07-17 bestaetigt - Gemini hat von allen vier
                                        # Anbietern die ungueenstigsten Vertragsbedingungen,
                                        # siehe Memory project_cerebras_free_tier_aenderung_2026-08-17) -
                                        # konservativer Deckel weit unter der recherchierten
                                        # ~1.000-1.500-Calls/Tag-Kapazitaet (Gemini 3.1 Flash-Lite),
                                        # bewusst am seltensten genutzt (siehe agent/krypto/
                                        # budget_allocator.py Modul-Docstring)
  cooldown_stunden: 3.5                 # Mitte der bestaetigten 3-4-Std.-Spanne (2026-07-13)
  spot_cooldown_stunden: 20             # Fix (2026-07-15, echter Notebook-Vorfall, siehe Memory
                                        # project_llm_budget_ueberlast_2026-07-15): Tier 3 (Spot)
                                        # hatte bisher KEINEN Cooldown, rotierte bei ~40 Krypto-
                                        # Assets alle ~40 Min komplett durch (234 Signale/Tag fuer
                                        # nur 40 Symbole). <24h, damit die taegliche Rotation nicht
                                        # durch feste Tick-Zeiten nach hinten driftet. Gilt fuer
                                        # rein taktische Watchlist-Assets ohne Position (siehe
                                        # spot_cooldown_stunden_kern).
  spot_cooldown_stunden_kern: 10         # Zwei-Stufen-Cooldown (2026-07-16, Nutzer-Wunsch nach
                                        # Gewichtungs-Analyse): kuerzerer Cooldown fuer rolle=core
                                        # ODER aktuell gehaltene Assets ODER offene Hebel-Position
                                        # (~2x/Tag statt ~1x/Tag) - echtes Geld/strategische
                                        # Kernrolle verdient haeufigere Neubewertung als ein
                                        # unbeobachteter taktischer Watchlist-Kandidat ohne
                                        # Position, siehe agent/krypto/
                                        # signal_batch.py::select_assets_due_for_signal().
  spot_cooldown_stunden_ausgemustert: 120  # [OFFEN]/vorlaeufig (Klassifikations-Redesign
                                        # 2026-07-16): dritte Cooldown-Stufe fuer
                                        # beobachtungsstatus=ausgemustert - niedrigste
                                        # Prioritaet, aber NIE Ausschluss ("darf nicht sterben",
                                        # Nutzer-Formulierung). 5 Tage = plausibler Startwert,
                                        # noch nicht ueber echten Betrieb kalibriert. Kern
                                        # (rolle=core/gehalten/offene Hebel-Position) schlaegt
                                        # IMMER Ausgemustert (Praezedenz).
  hebel_cooldown_stunden_ausgemustert: 120  # Analog zu oben, fuer Hebel-Trigger-Kandidaten -
                                        # Kern/Taktisch bleiben bei cooldown_stunden (3.5h)
                                        # unveraendert, nur diese neue Stufe kommt dazu.
  hebel_position_cooldown_stunden: 3     # NEU (2026-07-16, Nutzer-Wunsch: "getaetigte und
                                        # aktive Positionen haben hohe Prioritaet unabhaengig
                                        # davon, ob es eine Empfehlung gab"): offene
                                        # Hebel-Positionen als eigene, vom Trigger-Screening
                                        # unabhaengige Kandidatenquelle mit engem Cooldown -
                                        # 3h ist deutlich enger als Kern (3.5h Standard-Trigger-
                                        # Cooldown), aber budgetvertraeglich (siehe Diskussion:
                                        # 15 Min haette bei nur 1 offener Position mehr Budget
                                        # verbraucht als der gesamte Tagesdeckel).

# --- Hebel-Screening (2026-07-14, Phase 1, siehe docs/hebel_positionsformel.md) ---
# Deterministisches Zwei-Zweige-Scoring (Trendfolge + Kontra), KEIN Groq-Aufruf hier -
# reine Vorpruefung alle 15 Min, analog zur Marktscan-Stufe-B-Bewertung.
hebel_screening:
  aktiv: true
  intervall_minuten: 15
  oi_lookback_stunden: 4               # Fenster fuer die OI-%-Aenderung (Trendfolge-Zweig)
  trendfolge:
    oi_aenderung_schwelle_prozent: 3.0       # [OFFEN] Platzhalter, keine OI-Historie zum Kalibrieren vorhanden
    kursaenderung_schwelle_prozent: 2.0       # [OFFEN] angelehnt an Marktscan-Muster
    funding_rate_noch_nicht_extrem: 0.0001    # wiederverwendet aus anticyclic.py, live gegengeprueft
  kontra:
    funding_rate_extrem_schwelle: 0.0001       # wie oben
    long_bias_extrem_oben_prozent: 75.0         # angehoben von anticyclic.py's 65% - Live-Check
                                                  # zeigte 65% ist bei Binance schon Alltag, kein Extrem
    long_bias_extrem_unten_prozent: 25.0
  score_schwelle_kandidat: 70            # ab hier gilt ein Trigger als "Kandidat"
  gewichte:                               # [OFFEN] noch nicht final festgelegt
    trendfolge:
      gewicht_oi_aenderung: 0.3
      gewicht_kursaenderung: 0.3
      gewicht_funding_rate: 0.2
      gewicht_konfluenz: 0.2
    kontra:
      gewicht_funding_rate_extrem: 0.35
      gewicht_long_bias_extrem: 0.35
      gewicht_wende_anzeichen: 0.3

# --- E-Mail-Benachrichtigung (U-8, 2026-07-12, siehe Regelwerksmanual.md Kap. 12;
# Zugangsdaten NUR in .env, nie hier) ---
benachrichtigung:
  email:
    aktiv: true
    empfaenger: gernotspiessmaier@gmail.com
    empfehlungen_aktiv: true           # 2026-07-14: E-Mail bei handlungsrelevanten
      # Spot-/Hebel-Empfehlungen (KAUFEN/VERKAUFEN/NACHKAUFEN/TAUSCHEN bzw.
      # ERÖFFNEN/HEBEL_ERHÖHEN/HEBEL_SENKEN/TEILVERKAUF/SCHLIESSEN) - HALTEN
      # loest bewusst NIE eine Mail aus. Bitpanda-Listing-Filter separat als
      # In-App-Schalter (Menü "Benachrichtigungen"), nicht hier.
    job_ausfall_cooldown_minuten: 60   # [OFFEN] Spam-Schutz: derselbe Job meldet
      # sich hoechstens 1x pro Cooldown-Fenster, auch bei einem mehrstuendigen
      # Ausfall (siehe scheduler/background.py::_notify_job_failure())
    # SMTP ist fest auf Gmail verdrahtet (smtp.gmail.com:587, siehe
    # api/email_notify.py) - kein config-seitiger Wert mehr noetig.
    # Zugangsdaten (GMAIL_ABSENDER_ADRESSE/GMAIL_APP_PASSWORT) ausschliesslich in .env.

# --- Regime-Steuerung: marktabhaengiges Verhalten (siehe Spezifikation Kap. 14) ---
regime:
  bestimmung: hybrid                   # RG-1: regelbasiert (Basis) + KI-Override + manueller Override
  manueller_override: none             # RG-8: none | krise_extrem | baer | seitwaerts | bulle | euphorie_extrem
  risikoappetit_faktor: 1.0            # [OFFEN] RG-4: globaler Makro-Multiplikator 0.3-1.0
  # RG-3 Profile ueberschreiben je Regime: Kategorie-Gewichte (Stufe B, Marktscan),
  # Small-Cap-Budget, Mindest-Konfidenz. Gewichte technik+fundamental+momentum+
  # kontext_makro = 1.0. Alle Werte VORLAEUFIG. gewicht_kontext_makro (2026-07-09,
  # Nutzungs-Diskussion Marktscan Stufe C) nutzt liquiditaets_regime/zyklus_risiko/
  # btc_matrix_state aus agent/regime.py - bewusst hoeher gewichtet in den Extrem-
  # Regimen (krise_extrem/euphorie_extrem), da genau dort Zyklus-/Liquiditaetslage am
  # aussagekraeftigsten ist; die drei bestehenden Gewichte wurden proportional
  # reduziert, damit die Summe weiterhin 1.0 ergibt (kein Verhaltensrisiko, da vorher
  # nichts diese Gewichte konsumiert hat).
  profile:
    krise_extrem:
      small_cap_budget_prozent: 0
      gewicht_technik: 0.15
      gewicht_fundamental: 0.45
      gewicht_momentum: 0.15
      gewicht_kontext_makro: 0.25
      min_konfidenz_prozent: 85
    baer:
      small_cap_budget_prozent: 4
      gewicht_technik: 0.24
      gewicht_fundamental: 0.40
      gewicht_momentum: 0.16
      gewicht_kontext_makro: 0.20
      min_konfidenz_prozent: 75
    seitwaerts:
      small_cap_budget_prozent: 8
      gewicht_technik: 0.34
      gewicht_fundamental: 0.34
      gewicht_momentum: 0.17
      gewicht_kontext_makro: 0.15
      min_konfidenz_prozent: 65
    bulle:
      small_cap_budget_prozent: 12
      gewicht_technik: 0.43
      gewicht_fundamental: 0.25
      gewicht_momentum: 0.17
      gewicht_kontext_makro: 0.15
      min_konfidenz_prozent: 60
    euphorie_extrem:
      small_cap_budget_prozent: 15
      gewicht_technik: 0.38
      gewicht_fundamental: 0.15
      gewicht_momentum: 0.22
      gewicht_kontext_makro: 0.25
      min_konfidenz_prozent: 60
      gewinnabsicherung_verschaerft: true  # RG-11: engere Trailing-Stops, Teilverkaeufe

# --- Boden-Zielzone: BTC/ETH-Bodenpreis-Schaetzung + Aktien-Baermarkt-Overlay
# (AZ-4 Baustein 2, 2026-07-12, siehe Basisinfos/Regelwerksmanual.md) ---
boden_zielzone:
  aktiv: true
  reifegrad_daempfer_staerke: 0.15          # [OFFEN] 0-1: zieht die historische
    # Abweichungs-Bandkante Richtung 0 (mildere Korrekturen bei wachsender
    # Marktkapitalisierung, "diminishing returns"). effective_edge = raw_edge * (1 - Wert)
  equities_baermarkt_schwelle_prozent: 20   # [OFFEN] Drawdown vom trailing-Lookback-ATH
  equities_baermarkt_lookback_jahre: 5      # [OFFEN]
  equities_baermarkt_verknuepfung: entweder # Nutzer-Entscheidung 2026-07-12, fest:
    # "entweder" (S&P 500 ODER Nasdaq reicht) statt "beide gleichzeitig"
  equities_overlay_shift_std: 0.2           # [OFFEN] zusaetzliche Vertiefung der unteren
    # Bandkante (Standardabweichungen), wenn der Aktien-Baermarkt aktiv ist

# --- Cash-Reserve-Ziel: gewichtete Nachkauf-Reserve fuer BTC/ETH
# (AZ-4 Baustein 3, 2026-07-12, siehe Basisinfos/Regelwerksmanual.md) ---
cash_reserve_ziel:
  rundengewichte: [20, 30, 50]              # Nutzer-Entscheidung 2026-07-12, fest
    # (kein [OFFEN]): 3 Runden ("Buying in Thirds"), asymmetrisch gewichtet
    # (Value-Averaging-Prinzip - bei groesserem Ruecksetzer proportional mehr
    # Kapital). Muss auf 100 summieren. Reine Zusatz-Information, kein neues
    # Veto - RM-4 (oben) bleibt der harte Minimum-Floor.

# --- Backward-Tracking (Selbstverifikations-Vision Schritt 2, siehe
# Basisinfos/Regelwerksmanual.md Kap. 9 / Spezifikation Kap. 16) ---
backward_tracking:
  abgelaufen_nach_tagen: 90   # [OFFEN] Vorschlag - ab wann ein unentschiedenes
                              # KAUFEN/NACHKAUFEN-Signal als "abgelaufen" gilt
                              # (weder Take-Profit- noch Stop-Loss-Zone erreicht)

# --- Antizyklische Kauf-Disziplin (siehe Spezifikation Kap. 15) ---
antizyklisch:
  aktiv: true
  bestaetigung_pflicht: true           # AZ-2: "kaufe die Bestaetigung, nicht das Messer"
  spot_sondierung_nur_kernwerte: true  # AZ-3: kleine Vorab-Tranche nur fuer core (BTC/ETH)
  gestaffelt_kaufen: true              # AZ-4: Tranchen/DCA, nie all-in
  fundamental_gate: true               # AZ-5: Nachkauf nur bei intakter Substanz
  these_gescheitert_stop: true         # AZ-6: Nachkaufen stoppen, wenn These scheitert
  hebel:
    nur_nach_bestaetigung: true        # AZ-7
    aus_bei_krise_extrem: true         # AZ-7
    aus_bei_strukturrisiko: true       # AZ-7
