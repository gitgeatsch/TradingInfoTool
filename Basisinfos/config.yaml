# ==========================================================
# TradingInfoTool - Laufzeit-Konfiguration (maschinenlesbar)
# ----------------------------------------------------------
# Diese Datei enthaelt die "harten" Parameter, die App und
# KI-Agent zur Laufzeit auslesen. Erklaerungen und Begruendungen
# stehen in Spezifikation.md (gleicher Ordner).
#
# BEARBEITEN IN NOTEPAD++ - bitte beachten:
#   - Nur LEERZEICHEN zum Einruecken (KEINE Tabs!), 2 pro Ebene
#   - Nach dem Schluessel immer Doppelpunkt + Leerzeichen:  schluessel: wert
#   - Listenpunkte beginnen mit "- "
#   - Kommentare beginnen mit #
#   - Tipp: in Notepad++  Ansicht > Symbole > Leerzeichen/Tab anzeigen,
#     dann sieht man Tabs sofort. Sprache > YAML aktiviert Farb-Hervorhebung.
#   - Werte mit Kommentar [OFFEN] sind Vorschlaege -> bitte bestaetigen/anpassen
# ==========================================================

meta:
  projekt: TradingInfoTool
  eigentuemer: Gernot Spiessmaier
  version: 1.6
  stand: 2026-07-08

# --- Uebergeordnete Ziele / Leitplanken (siehe Spezifikation Kap. 1) ---
ziele:
  kapitalerhalt_vor_gewinn: true       # Z-1: Kapitalerhalt hat immer Vorrang
  crv_minimum: 2.0                     # Z-2: Mindest-Chance-Risiko-Verhaeltnis (2:1)
  max_drawdown_prozent: 15             # Z-3: [OFFEN] Vorschlag -> bei Ueberschreitung Kapitalschutz-Modus
  begruendung_pflicht: true            # Z-4: jede Empfehlung mit Begruendung + Konfidenz

# --- Risikomanagement / Kernmodul (siehe Spezifikation Kap. 3) ---
risiko:
  risiko_pro_trade_prozent: 2          # RM-1: max. Verlust bis Stop-Loss je Trade
  max_allokation_pro_asset_prozent: 25 # RM-2: fuer typ=taktisch (core siehe unten)
  max_allokation_pro_core_asset_prozent: 35 # RM-2: fuer typ=core (BTC/ETH) - vorlaeufig,
                                        # 2026-07-07 entschieden nachdem echte BTC-Allokation
                                        # (28,4%) das alte einheitliche 25%-Limit ueberschritt.
                                        # [OFFEN] Thema "BTC hat den Lead" noch explizit zu
                                        # besprechen (Rolle von BTC im Portfolio insgesamt,
                                        # nicht nur die Prozentzahl) - siehe Memory.
  cash_reserve_min_prozent: 10         # RM-4: [OFFEN] Vorschlag
  cash_reserve_min_fixed_eur: 2000     # RM-4: [OFFEN] Vorschlag - Hybrid-Formel (2026-07-10):
                                        # erforderlich ist das GROESSERE aus Prozentsatz und
                                        # diesem Festbetrag (Vorhersehbarkeit bei kleinen
                                        # Portfolios, skaliert trotzdem bei grossen mit)
  max_allokation_small_cap_prozent: 12 # [OFFEN] Tier-3 Small-Cap-Budget, Vorschlag 10-15 (Kap. 13/14)
  stop_loss_pflicht: true              # RM-5: jede Position braucht einen Stop-Loss
  trailing_stop_erlaubt: true          # RM-6: Gewinnsicherung
  # RM-3: maximale Allokation je Assetklasse (detailliert statt pauschal)
  max_allokation_pro_klasse_prozent:
    krypto: 100                        # [OFFEN] aktuell nur Krypto im Einsatz
    aktien: 0
    etf: 0
    rohstoffe: 0
  hebel:
    erlaubt: true
    nur_long: true                     # RM-10: kein Short
    max_hebel: 3                       # [OFFEN] Vorschlag, an Volatilitaet koppeln
    liquidationspreis_ausweisen: true  # RM-11

