# ==========================================================
# TradingInfoTool - Laufzeit-Konfiguration (maschinenlesbar)
# ----------------------------------------------------------
# Diese Datei enthaelt die "harten" Parameter, die App und
# KI-Agent zur Laufzeit auslesen. Erklaerungen und Begruendungen
# stehen in Spezifikation.md (gleicher Ordner).
#
# BEARBEITEN IN NOTEPAD++ - bitte beachten:
#   - Nur LEERZEICHEN zum Einruecken (KEINE Tabs!), 2 pro Ebene
#   - Nach dem Schluessel immer Doppelpunkt + Leerzeichen:  schluessel: wert
#   - Listenpunkte beginnen mit "- "
#   - Kommentare beginnen mit #
#   - Tipp: in Notepad++  Ansicht > Symbole > Leerzeichen/Tab anzeigen,
#     dann sieht man Tabs sofort. Sprache > YAML aktiviert Farb-Hervorhebung.
#   - Werte mit Kommentar [OFFEN] sind Vorschlaege -> bitte bestaetigen/anpassen
# ==========================================================

meta:
  projekt: TradingInfoTool
  eigentuemer: Gernot Spiessmaier
  version: 1.6
  stand: 2026-07-08

# --- Uebergeordnete Ziele / Leitplanken (siehe Spezifikation Kap. 1) ---
ziele:
  kapitalerhalt_vor_gewinn: true       # Z-1: Kapitalerhalt hat immer Vorrang
  crv_minimum: 2.0                     # Z-2: Mindest-Chance-Risiko-Verhaeltnis (2:1)
  max_drawdown_prozent: 15             # Z-3: [OFFEN] Vorschlag -> bei Ueberschreitung Kapitalschutz-Modus
  begruendung_pflicht: true            # Z-4: jede Empfehlung mit Begruendung + Konfidenz

# --- Risikomanagement / Kernmodul (siehe Spezifikation Kap. 3) ---
risiko:
  risiko_pro_trade_prozent: 2          # RM-1: max. Verlust bis Stop-Loss je Trade
  max_allokation_pro_asset_prozent: 25 # RM-2: fuer typ=taktisch (core siehe unten)
  max_allokation_pro_core_asset_prozent: 35 # RM-2: fuer typ=core (BTC/ETH) - vorlaeufig,
                                        # 2026-07-07 entschieden nachdem echte BTC-Allokation
                                        # (28,4%) das alte einheitliche 25%-Limit ueberschritt.
                                        # [OFFEN] Thema "BTC hat den Lead" noch explizit zu
                                        # besprechen (Rolle von BTC im Portfolio insgesamt,
                                        # nicht nur die Prozentzahl) - siehe Memory.
  konfidenz_positionsgroesse_sockel_anteil: 0.5  # RM-1/RM-2 (2026-07-16 ergaenzt):
                                        # Konfidenz-skalierte Positionsgroessen-Obergrenze
                                        # statt einer flachen Obergrenze fuer jede Konfidenz
                                        # oberhalb der Regime-Mindestschwelle. Bei genau
                                        # min_konfidenz_prozent (siehe regime.profile) greift
                                        # dieser Sockel-Anteil (50% der RM-1/RM-2-Obergrenze),
                                        # bei 100% Konfidenz die volle Obergrenze - linear
                                        # dazwischen. Gaengige Trading-Praxis (konvitions-
                                        # gewichtete Positionsgroesse/Bruchteils-Kelly-Logik):
                                        # eine Empfehlung an der Mindestschwelle ist der am
                                        # wenigsten ueberzeugende Fall, der ueberhaupt noch
                                        # durchgelassen wird - sollte nie automatisch die volle
                                        # Obergrenze bekommen. Siehe agent/krypto/risk_gate.py
                                        # ::post_check() fuer die Umsetzung; gilt fuer Krypto
                                        # UND Aktien (teilen sich risk_gate.py).
  gegenszenario_wahrscheinlichkeit_schwelle_prozent: 35  # Spot/Aktien-Pendant zum Hebel-
                                        # Gegenszenario-Deckel (2026-07-17, Regelwerk-
                                        # Konsistenzpruefung nach dem Hebel-Fix): das Modell
                                        # liefert forecast.bear.probability_pct bei jeder
                                        # KAUFEN/NACHKAUFEN-Empfehlung, wurde bisher aber nie
                                        # ausgewertet. Ab diesem Wert greift eine zusaetzliche
                                        # Positionsgroessen-Deckelung (siehe unten) - kein hartes
                                        # Veto wie bei Hebel, da Spot/Aktien kein Liquidations-
                                        # risiko tragen. Unkalibrierter Startwert, identisch zum
                                        # Hebel-Pendant (risiko.hebel.gegenszenario_wahrscheinlichkeit_
                                        # schwelle_prozent) - nach echten Betriebsdaten anpassen.
  gegenszenario_positionsgroesse_deckel_anteil: 0.5  # Positionsgroessen-Obergrenze wird bei
                                        # ueberschrittener Schwelle zusaetzlich zur Konfidenz-
                                        # Skalierung (oben) auf diesen Anteil reduziert. Siehe
                                        # agent/krypto/risk_gate.py::post_check(), gilt fuer
                                        # Krypto UND Aktien (teilen sich risk_gate.py).
  technischer_konflikt_deckel_anteil: 0.6  # NEU (2026-07-18, echter CAT-Fall: KAUFEN-
                                        # Empfehlung mit 80% Konfidenz trotz "EMA-Ordnung
                                        # bearish, aber MACD/RSI bieten Gegenargumente" -
                                        # widerspruechliche Technik wurde nirgends deterministisch
                                        # bewertet). Greift, wenn indicators/calculations.py::
                                        # summarize_confluence() "gemischt" liefert (weder
                                        # bullish noch bearish dominiert) - Positionsgroessen-
                                        # Obergrenze wird zusaetzlich auf diesen Anteil reduziert.
                                        # Unkalibrierter Startwert, nach echten Betriebsdaten
                                        # anpassen.
  crv_knapp_schwelle_relativ: 0.2       # NEU (2026-07-18, gleicher Fund): CRV_MINIMUM (2.0) ist
                                        # bisher ein binaeres Gate - CRV 2,01 und 4,0 werden
                                        # identisch behandelt. Ab diesem relativen Abstand ZUR
                                        # Mindestgrenze (0.2 = CRV < 2.0*1.2 = 2.4) greift die
                                        # zusaetzliche Deckelung unten. Unkalibrierter Startwert.
  crv_knapp_positionsgroesse_deckel_anteil: 0.6  # Positionsgroessen-Obergrenze wird bei CRV
                                        # knapp am Minimum zusaetzlich auf diesen Anteil reduziert.
                                        # Siehe agent/krypto/risk_gate.py::post_check().
  cash_reserve_min_prozent: 10         # RM-4: bestaetigter Wert (2026-07-17, nicht mehr [OFFEN]) -
                                        # gaengige Hausnummer als Overtrading-Bremse/Liquiditaets-
                                        # puffer, in der Praxis bewaehrt (Nutzer haelt bewusst
                                        # Puffer darueber). Getrennt von AZ-4 cash_reserve_ziel
                                        # weiter unten zu sehen (andere Frage: Sicherheits-Floor
                                        # vs. strategische Nachkauf-Zielgroesse).
  cash_reserve_min_fixed_eur: 2000     # RM-4: bestaetigter Wert (2026-07-17, nicht mehr [OFFEN]) -
                                        # Hybrid-Formel (2026-07-10): erforderlich ist das GROESSERE
                                        # aus Prozentsatz und diesem Festbetrag (Vorhersehbarkeit bei
                                        # kleinen Portfolios, skaliert trotzdem bei grossen mit).
                                        # Revisit-Bedingung: falls beide Werte in der Praxis mal ein
                                        # echtes Problem verursachen (zu eng/zu locker), siehe Memory
                                        # project_portfolio_vollstaendigkeit_cash_staking.md.
  max_allokation_small_cap_prozent: 12 # [OFFEN] Tier-3 Small-Cap-Budget, Vorschlag 10-15 (Kap. 13/14)
  stop_loss_pflicht: true              # RM-5: jede Position braucht einen Stop-Loss
  trailing_stop_erlaubt: true          # RM-6: Gewinnsicherung
  # RM-3: maximale Allokation je Assetklasse (detailliert statt pauschal)
  max_allokation_pro_klasse_prozent:
    krypto: 100                        # [OFFEN] aktuell nur Krypto im Einsatz
    aktien: 0
    etf: 0
    rohstoffe: 0
  hebel:
    erlaubt: true
    nur_long: false                    # RM-10 (2026-07-14 korrigiert): Short bleibt Teil
                                        # der Agent-Logik (rein beratend), nur Bitpanda
                                        # kann Short aktuell nicht ausfuehren
    max_hebel: 10                      # 2026-07-14 kalibriert gegen echte Bitpanda-
                                        # Margin-Historie (185 Positionen, 2-10x genutzt,
                                        # Oe 6,44x je Einzelkauf) - vorher Platzhalter "3"
    risiko_pro_trade_prozent_hebel: 1  # RM-1-Aequivalent fuer Hebel, bewusst niedriger als
                                        # Spot (2%) wegen Liquidations-Gap-Risiko +
                                        # laufender Finanzierungsgebuehr, siehe
                                        # docs/hebel_positionsformel.md
    liquidationspreis_ausweisen: true  # RM-11 - nur Schaetzung, Bitpanda-Formel nicht
                                        # oeffentlich, siehe docs/hebel_positionsformel.md
    liquidations_sicherheitsmarge_relativ: 0.09  # RM-11 - 2026-07-19 NEU KALIBRIERT (vorher
                                        # 0.175, ein reiner "Mittelwert einer 15-20%-Spanne"
                                        # ohne echte Quelle). Jetzt hergeleitet aus Bitpandas
                                        # offizieller Doku (Margin Level = Positionswert /
                                        # Kreditbetrag, Liquidation bei ~105-110% -> mathematisch
                                        # aequivalent zu Marge 4,76%-9,09%) PLUS 4 echten
                                        # rekonstruierten Liquidationsfaellen (LINK/TAO/TAO/SUI,
                                        # implizierte Marge 6,5%-8,4%, siehe Regelwerksmanual.md
                                        # Nachtrag 2026-07-19) - 0.09 liegt knapp ueber dem
                                        # hoechsten real beobachteten Wert, bewusster kleiner
                                        # Sicherheitspuffer statt der vorherigen ~2x zu hohen
                                        # Schaetzung. Wirkt auf estimate_liquidation_price()
                                        # (angezeigter Wert) UND max_safe_hebel() (RM-11-Deckel
                                        # fuer empfohlenen Hebel) gleichermassen.
    max_hebel_faellt_regime_krise_extrem_auf_null: true  # AZ-7
    kontra_konservativ_faktor: 0.6  # [OFFEN] AZ-7-Konservativ-Bias NUR fuer Zweig 2
                                    # (Kontra) - daempft max_sicherer_hebel zusaetzlich,
                                    # gilt NICHT fuer Zweig 1 (Trendfolge), siehe
                                    # docs/hebel_positionsformel.md Sanity-Check-Korrektur
                                    # vom 2026-07-14
    # --- Regelwerk-Nachtrag 2026-07-17 (echter LINK-Fall: 5x-LONG-Eroeffnung
    # WAEHREND bereits erkanntem baer-Regime, 80% Konfidenz reichte damals
    # aus, keine dieser beiden Bremsen existierte) - siehe Memory
    # project_hebel_rahmenbedingungen.md fuer die volle Herleitung. [OFFEN],
    # noch nicht ueber laengeren echten Betrieb kalibriert.
    regime_konflikt_hebel_deckel: 3.0  # gilt, wenn die Positions-Richtung dem
                                        # Regime entgegensteht (bär+LONG oder
                                        # bulle+SHORT) - Hebel wird zusaetzlich
                                        # zu Config-Maximum/RM-11 auf diesen
                                        # Wert gedeckelt, unabhaengig von der
                                        # Konfidenz (Gegen-Trend + Hebel ist
                                        # strukturell riskanter als beides
                                        # einzeln).
    gegenszenario_wahrscheinlichkeit_schwelle_prozent: 35  # ab dieser vom
                                        # Modell selbst geschaetzten Gegen-
                                        # szenario-Wahrscheinlichkeit (bear_prob
                                        # bei LONG, bull_prob bei SHORT) greift
                                        # der Deckel unten - nutzt die ohnehin
                                        # vom Modell erzeugte forecast-
                                        # Wahrscheinlichkeit statt nur die
                                        # Konfidenz zu betrachten.
    gegenszenario_hebel_deckel: 3.0     # wie regime_konflikt_hebel_deckel,
                                        # aber ausgeloest durch die Forecast-
                                        # Wahrscheinlichkeit (siehe oben) -
                                        # beide Deckel koennen gleichzeitig
                                        # greifen, es zaehlt immer der
                                        # niedrigste bindende Wert.
    technischer_konflikt_hebel_deckel: 3.0  # NEU (2026-07-18, Spot-Pendant siehe
                                        # risiko.technischer_konflikt_deckel_anteil) -
                                        # greift, wenn summarize_confluence() "gemischt"
                                        # liefert (weder bullish noch bearish dominiert).
                                        # Wie regime_konflikt_hebel_deckel ein Hebel-
                                        # Deckel (kein Anteil wie bei Spot), da Hebel
                                        # ueber min() aus mehreren Deckel-Kandidaten
                                        # bestimmt wird, siehe hebel_risk_gate.py::
                                        # _hebel_deckel_kandidaten().
    crv_knapp_schwelle_relativ: 0.2     # NEU (2026-07-18) - identische Definition wie
                                        # risiko.crv_knapp_schwelle_relativ (Spot).
    crv_knapp_hebel_deckel: 3.0         # NEU (2026-07-18) - Hebel-Deckel-Kandidat, wenn
                                        # das CRV nur knapp ueber CRV_MINIMUM liegt.
    retail_konsens_hebel_deckel: 3.0    # NEU (2026-07-19, echter AVAX-Fund) - greift, wenn
                                        # die empfohlene Richtung mit der extremen Retail-
                                        # Mehrheitspositionierung uebereinstimmt (>65%/<35%
                                        # Long-Konten-Anteil, siehe anticyclic.py::
                                        # LONG_BIAS_EXTREME_THRESHOLD_PCT), statt (antizyklisch
                                        # korrekt) dagegen zu wetten - siehe hebel_risk_gate.py::
                                        # retail_konsens_risiko().

